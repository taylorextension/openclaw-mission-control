name: Deploy to Koyeb

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Koyeb CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
        echo "$HOME/.koyeb/bin" >> $GITHUB_PATH
    
    - name: Configure Koyeb
      run: |
        mkdir -p ~/.koyeb
        echo "authtoken: ${{ secrets.KOYEB_TOKEN }}" > ~/.koyeb.yaml
    
    - name: Deploy to Koyeb
      run: |
        export PATH="$HOME/.koyeb/bin:$PATH"
        koyeb app init --name openclaw-mission-control || true
        koyeb deploy --app openclaw-mission-control --service mission-control --port 8000 --dockerfile Dockerfile.koyeb --git github.com/taylorextension/openclaw-mission-control --git-branch master
