name: Deploy to Koyeb

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Koyeb CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
        echo "$HOME/.koyeb/bin" >> $GITHUB_PATH
    
    - name: Configure Koyeb
      run: |
        mkdir -p ~/.koyeb
        echo "authtoken: ${{ secrets.KOYEB_TOKEN }}" > ~/.koyeb.yaml
    
    - name: Deploy to Koyeb
      run: |
        export PATH="$HOME/.koyeb/bin:$PATH"
        # Criar app se não existir
        koyeb app create openclaw-mission-control 2>/dev/null || true
        # Criar serviço
        koyeb service create mission-control \
          --app openclaw-mission-control \
          --git github.com/taylorextension/openclaw-mission-control \
          --git-branch master \
          --dockerfile Dockerfile.koyeb \
          --port 8000 \
          --env AUTH_MODE=local \
          --env LOCAL_AUTH_TOKEN=k1vPxUkx7rrKtPXeszrZzFJgP5oBZa3pXkwR5gp4CdkVaMXTYHqK/w== \
          --env CORS_ORIGINS=* \
          --env DB_AUTO_MIGRATE=true \
          --env LOG_LEVEL=INFO \
          --instance-type free \
          2>/dev/null || \
        koyeb service update mission-control \
          --app openclaw-mission-control \
          --dockerfile Dockerfile.koyeb
